<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A sequence diagram with four actors: Cypress runner, spec file, page objects, and PriceLabs UI. Messages flow top to bottom across three phases — setup (beforeEach), execution (it), and teardown (afterEach) — showing login, fixture loading, UI interaction, assertions, and session cleanup.</desc>
